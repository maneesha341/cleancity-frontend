<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#1D9E75" />
    <meta name="description" content="CleanCity — Report waste issues and help keep your city clean. Earn green points for every report!" />

    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CleanCity" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="CleanCity" />

    <!-- Open Graph for sharing -->
    <meta property="og:title" content="CleanCity — Waste Management App" />
    <meta property="og:description" content="Report waste issues and help keep your city clean!" />
    <meta property="og:type" content="website" />

    <!-- Apple touch icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="%PUBLIC_URL%/icons/icon-144x144.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <title>CleanCity 🌱</title>

    <style>
      /* Splash screen style */
      #splash {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #0a5c3f, #1D9E75);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s ease;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash-icon {
        font-size: 72px;
        margin-bottom: 20px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      #splash-title {
        font-family: Arial, sans-serif;
        font-size: 32px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }
      #splash-sub {
        font-family: Arial, sans-serif;
        font-size: 14px;
        color: rgba(255,255,255,0.75);
        margin-bottom: 40px;
      }
      #splash-loader {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f0faf5;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run CleanCity.</noscript>

    <!-- Splash Screen -->
    <div id="splash">
      <div id="splash-icon">🌱</div>
      <div id="splash-title">CleanCity</div>
      <div id="splash-sub">Waste Management App</div>
      <div id="splash-loader"></div>
    </div>

    <div id="root"></div>

    <script>
      // Hide splash screen when app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(() => splash.remove(), 500);
          }
        }, 1500);
      });

      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('CleanCity SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
